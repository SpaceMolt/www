name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    # Don't burn Actions minutes on external PRs from forks
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: node scripts/fetch-catalog.mjs

      - run: pnpm lint

      # Tests are bun:test and need node_modules, so this runs after install.
      # No PostHog token is set here on purpose: analytics must stay inert
      # without one, and the suite asserts that.
      - run: bun test

      - run: pnpm build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_ZnJlZS1taXRlLTYuY2xlcmsuYWNjb3VudHMuZGV2JA' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
